; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev_idf

[env:esp32dev_idf]
platform = espressif32
board = esp32dev
framework = espidf
build_type = release
monitor_speed = 115200
upload_speed = 460800
board_upload.flash_size = 4MB
board_build.partitions = idf/partitions.csv
board_build.filesystem = littlefs
board_build.sdkconfig_defaults = idf/sdkconfig.defaults
build_flags =
  -DCOSTAR_DSL_TLS_MIN_LARGEST_8BIT_KB=12
  -DCOSTAR_DSL_TLS_MIN_FREE_8BIT_KB=28
  -DCOSTAR_DSL_TLS_RELAXED_LARGEST_8BIT_KB=10
  -DCOSTAR_DSL_TLS_RELAXED_FREE_THRESHOLD_8BIT_KB=31
extra_scripts =
  pre:tools/pio_filter_data.py
  post:tools/pio_record_hashes.py
